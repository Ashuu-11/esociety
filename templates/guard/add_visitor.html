<h2>Add Visitor</h2>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="name" placeholder="Visitor Name" required><br><br>

    <input type="text" name="phone" placeholder="Phone Number" required><br><br>

    <select name="resident" required>
        <option value="">Select Resident</option>
        {% for r in residents %}
            <option value="{{ r.id }}">
                {{ r.name }} ({{ r.block }}-{{ r.flat_number }})
            </option>
        {% endfor %}
    </select><br><br>

    <input type="text" name="purpose" placeholder="Purpose"><br><br>

    <button type="submit">Add Visitor</button>
</form>
